name = "grocer-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# D1 database — stores ONLY Live Activity push tokens + lightweight snapshots.
# CloudKit remains the source of truth for all grocery data.
#
# Create it once with:
#   pnpm --filter @grocer/api exec wrangler d1 create grocer
# then paste the returned database_id below.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "grocer"
database_id = "cafa38d7-0f60-4a22-a52b-00d56079354c"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# R2 bucket — caches AI-generated product images so each item name is only
# generated once.  Create with:
#   pnpm --filter @grocer/api exec wrangler r2 bucket create grocer-images
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "grocer-images"

# ---------------------------------------------------------------------------
# Vectorize index — stores OpenAI text-embedding-3-small vectors so that
# near-duplicate item names (e.g. "tomato" vs "tomatoes") resolve to the
# same cached product image instead of regenerating.
#
# Create once with:
#   pnpm --filter @grocer/api exec wrangler vectorize create grocer-image-embeddings \
#     --dimensions 1536 --metric cosine
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "IMAGE_INDEX"
index_name = "grocer-image-embeddings"

# ---------------------------------------------------------------------------
# Non-secret vars. Secrets (APNS_PRIVATE_KEY, OPENAI_API_KEY,
# LIVE_ACTIVITY_API_SECRET, STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY,
# STRIPE_PRICE_*) are set with
# `wrangler secret put` and, for local dev, via .dev.vars (see .dev.vars.example).
# ---------------------------------------------------------------------------
[vars]
APNS_ENVIRONMENT = "production"       # primary host; the other is auto-tried on BadDeviceToken
APNS_TEAM_ID="LNY6LA39SW"
APNS_KEY_ID="PCFC9F5R25"
APNS_BUNDLE_ID="org.narro.grocer"
IOS_MIN_BUILD = "1"
IOS_LATEST_BUILD = "1"
IOS_UPDATE_URL = "https://narro.org/grocer"
IOS_EXTERNAL_PURCHASE_STOREFRONTS = "USA"
POSTHOG_HOST = "https://us.i.posthog.com"
GRAFANA_OPENAI_METRICS_URL = "https://prometheus-prod-56-prod-us-east-2.grafana.net/api/prom"
GRAFANA_OPENAI_LOGS_URL = "https://logs-prod-036.grafana.net/loki/api/v1/push"
GRAFANA_OPENAI_METRICS_USERNAME = "3311740"
GRAFANA_OPENAI_LOGS_USERNAME = "1651545"

[observability]
enabled = true
# Add to your wrangler.toml file

[observability.traces]
enabled = true
# Must match the destination name you configured in Cloudflare dashboard
destinations = [ "grafana-traces" ]

[observability.logs]
enabled = true
# Must match the destination name you configured in Cloudflare dashboard
destinations = [ "grafana-logs" ]

# ---------------------------------------------------------------------------
# Cron Triggers — hourly retention-nudge sweep. The handler self-gates each
# device to daytime-local + an inactivity threshold, so running hourly just
# means every eligible user is checked at a sensible local hour.
# ---------------------------------------------------------------------------
[triggers]
crons = ["0 * * * *"]
