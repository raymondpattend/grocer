# XcodeGen project definition.
#
# Generate the Xcode project with:
#   brew install xcodegen   (once)
#   cd apps/ios && xcodegen generate
#   open Grocer.xcodeproj
#
# Then set your Team and replace the bundle identifiers / iCloud container.
# See apps/ios/README.md and docs/ENTITLEMENTS.md.

name: Grocer
options:
  bundleIdPrefix: org.narro
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa/
    from: 8.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.43.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.58.0

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    # Overwritten on Xcode Cloud by ci_scripts/ci_pre_xcodebuild.sh, which runs
    # `agvtool new-version $CI_BUILD_NUMBER` so every uploaded build gets a
    # unique, increasing build number. This "1" is only used for local builds.
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    SWIFT_VERSION: "5.0"
    # Full strict-concurrency checking. In Swift 5 language mode these surface as
    # warnings (the build stays green) — the CloudKit subsystem is already clean;
    # remaining warnings in other subsystems are a tracked backlog ahead of a
    # future SWIFT_VERSION=6.0 flip that turns them into errors. The dedicated
    # Swift 6 readiness lane (ci_scripts/swift6_check.sh) builds in Swift 6
    # language mode with warnings-as-errors to track that backlog.
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_LANGUAGE: en
    SWIFT_EMIT_LOC_STRINGS: YES
    DEVELOPMENT_TEAM: "LNY6LA39SW" # Narro LLC
    CODE_SIGN_STYLE: Automatic
    # Gates CloudKit. Default YES (normal builds use CloudKit). Build with
    # GR_CLOUDKIT_ENABLED=NO for UI-only / local sample-data mode.
    GR_CLOUDKIT_ENABLED: "YES"
    # LIVE_ACTIVITY_API_SECRET is injected by Config/Secrets.xcconfig. Do not set
    # an empty project-level value here; that overrides the xcconfig secret and
    # makes the app skip all signed Live Activity / APNs registration calls.
    # PostHog host is public; token is set per-config in Config/*.xcconfig.
    POSTHOG_HOST: "https://us.i.posthog.com"
    APS_ENVIRONMENT: development
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
  configs:
    Debug:
      APS_ENVIRONMENT: development
    Release:
      APS_ENVIRONMENT: production

targets:
  Grocer:
    type: application
    platform: iOS
    sources:
      - path: Grocer
      - path: Localization/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.narro.grocer
        INFOPLIST_FILE: Grocer/Info.plist
        CODE_SIGN_ENTITLEMENTS: Grocer/Grocer.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: GrocerWidget
      - package: Sentry
        # Use the dynamic framework variant: it ships dSYMs inside the
        # xcframework, which Xcode copies into the archive's dSYMs folder so
        # App Store Connect / sentry-cli get the Sentry.framework symbols. The
        # plain `Sentry` product is a static archive whose .framework wrapper
        # gets copied into the bundle with no dSYM, triggering upload warnings.
        product: Sentry-Dynamic
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: PostHog
        product: PostHog
    postCompileScripts:
      - name: Upload Debug Symbols to Sentry
        # No inputFiles/outputFiles: declaring the dSYM as an input forces this
        # post-compile script to run after GenerateDSYMFile, which (during an
        # archive build) is fused into a later phase than this one — producing a
        # build dependency cycle. basedOnDependencyAnalysis: false makes the
        # script run every build, and $DWARF_DSYM_FOLDER_PATH is set at runtime.
        basedOnDependencyAnalysis: false
        script: |
          # This script is responsible for uploading debug symbols and source context for Sentry.
          if which sentry-cli >/dev/null; then
            export SENTRY_ORG=narro
            export SENTRY_PROJECT=grocer-ios
            ERROR=$(sentry-cli debug-files upload --include-sources "$DWARF_DSYM_FOLDER_PATH" 2>&1 >/dev/null)
            if [ ! $? -eq 0 ]; then
              echo "warning: sentry-cli - $ERROR"
            fi
          else
            echo "warning: sentry-cli not installed, download from https://github.com/getsentry/sentry-cli/releases"
          fi

  GrocerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GrocerWidget
      - path: Localization/Localizable.xcstrings
      # Shared types used by the widget target.
      - path: Grocer/Shared/GroceryActivityAttributes.swift
      - path: Grocer/Shared/GroupDeepLink.swift
      - path: Grocer/Shared/WidgetSharedData.swift
      # Font Awesome (shared icon layer + bundled Jelly fonts).
      - path: Grocer/Shared/FontAwesome/FontAwesome.swift
      - path: Grocer/Shared/FontAwesome/FAIcons.swift
      - path: Grocer/Shared/FontAwesome/SFSymbolMapping.swift
      - path: Grocer/Shared/FontAwesome/Fonts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.narro.grocer.GrocerWidget
        INFOPLIST_FILE: GrocerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: GrocerWidget/GrocerWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO

  GrocerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrocerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.narro.grocer.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Grocer

schemes:
  Grocer:
    build:
      targets:
        Grocer: all
        GrocerWidget: all
        GrocerTests: [test]
    run:
      config: Debug
      environmentVariables:
        POSTHOG_PROJECT_TOKEN: "test-posthog-token"
        POSTHOG_HOST: "https://us.i.posthog.com"
    test:
      config: Debug
      environmentVariables:
        POSTHOG_PROJECT_TOKEN: "test-posthog-token"
        POSTHOG_HOST: "https://us.i.posthog.com"
      targets:
        - GrocerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
